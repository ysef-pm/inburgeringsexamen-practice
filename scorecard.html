<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Crimson+Pro:ital,wght@0,400;0,500;1,400&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <title>Am I ready for the inburgeringsexamen? — Free readiness scorecard | RateMyDutch</title>
    <meta name="description" content="Get a practical inburgering exam-readiness scorecard in a few minutes. See your strongest and weakest areas, then get a focused preparation plan.">
    <style>
    :root {
        --navy-deep: #1a2332; --navy-mid: #2d3a4f;
        --cream: #f8f5f0; --cream-dark: #ebe6df; --warm-white: #fdfcfa;
        --dutch-orange: #d4652a; --soft-gold: #c9a962;
        --error-red: #a63d2f; --text-muted: #6b7280;
        --font-display: 'Libre Baskerville', Georgia, serif;
        --font-body: 'Crimson Pro', 'Times New Roman', serif;
        --font-ui: 'Cormorant Garamond', serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--font-body); background: var(--cream); color: var(--navy-deep); line-height: 1.6; }
    .wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 4rem; }
    header.site { text-align: center; padding: 1.5rem 0 0; }
    header.site a { font-family: var(--font-display); font-size: 1.25rem; color: var(--navy-deep); text-decoration: none; }
    header.site a span { color: var(--dutch-orange); }
    h1 { font-family: var(--font-display); font-size: clamp(1.7rem, 4.5vw, 2.4rem); line-height: 1.25; margin: 2rem 0 1rem; }
    h2 { font-family: var(--font-display); font-size: 1.3rem; margin: 1.5rem 0 .75rem; }
    p.lede { font-size: 1.15rem; }
    .muted { color: var(--text-muted); font-size: .95rem; }
    .card { background: var(--warm-white); border: 1px solid var(--cream-dark); border-radius: 8px; padding: 1.5rem; margin: 1.25rem 0; }
    .btn { display: inline-block; font-family: var(--font-ui); font-size: 1.1rem; font-weight: 600; letter-spacing: .02em;
           background: var(--dutch-orange); color: var(--warm-white); border: none; border-radius: 5px;
           padding: .75rem 1.75rem; cursor: pointer; text-decoration: none; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn-ghost { background: transparent; color: var(--navy-deep); border: 1px solid var(--navy-mid); }
    input[type="email"] { width: 100%; font-family: var(--font-body); font-size: 1.05rem; padding: .7rem .9rem;
           border: 1px solid var(--cream-dark); border-radius: 5px; background: var(--warm-white); margin: .35rem 0 .75rem; }
    label.consent { display: flex; gap: .6rem; align-items: flex-start; font-size: .98rem; margin: .5rem 0; cursor: pointer; }
    label.consent input { margin-top: .3rem; }
    .option { display: block; width: 100%; text-align: left; font-family: var(--font-body); font-size: 1.02rem;
              background: var(--warm-white); border: 1px solid var(--cream-dark); border-radius: 6px;
              padding: .7rem .9rem; margin: .4rem 0; cursor: pointer; }
    .option.selected { border-color: var(--dutch-orange); background: #faf1ea; }
    .progress { height: 6px; background: var(--cream-dark); border-radius: 3px; margin: 1rem 0; overflow: hidden; }
    .progress > div { height: 100%; background: var(--dutch-orange); width: 0; transition: width .25s; }
    .skill-row { display: flex; align-items: center; gap: .75rem; margin: .5rem 0; }
    .skill-row .name { flex: 0 0 11rem; }
    .skill-row .bar { flex: 1; height: 10px; background: var(--cream-dark); border-radius: 5px; overflow: hidden; }
    .skill-row .bar > div { height: 100%; background: var(--dutch-orange); }
    .skill-row .pct { flex: 0 0 3rem; text-align: right; font-weight: 600; }
    .error { color: var(--error-red); margin: .5rem 0; }
    footer { text-align: center; margin-top: 3rem; }
    ol.plan li { margin: .5rem 0; }
    @media (max-width: 480px) { .skill-row .name { flex-basis: 8.5rem; font-size: .92rem; } }
    </style>
</head>
<body>
    <header class="site"><a href="/">RateMy<span>Dutch</span></a></header>
    <div class="wrap" id="app" data-page="scorecard">
        <noscript><p>This scorecard needs JavaScript. Meanwhile, you can practise all exam sections free at <a href="/">RateMyDutch</a>.</p></noscript>
    </div>
    <script type="module" src="/js/scorecard.js"></script>
</body>
</html>
